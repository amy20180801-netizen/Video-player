<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频加载中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    p { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>视频加载中...</h1>
  <p>正在跳转到播放页面</p>
  <a id="btn" href="#">点击直接播放</a>
  <script>
    const url = "https://www.youtube.com/watch?v=cE0uah6UhfA&autoplay=1";
    document.getElementById("btn").href = url;
    setTimeout(() => { window.location.href = url; }, 800);
  </script>
</body>
</html>
